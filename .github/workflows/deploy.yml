name: Debug Build Directory

on:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Look for build output
        run: |
          echo "=== Что находится в корне после сборки? ==="
          ls -la
          echo "=== Ищем все папки с именем dist или build ==="
          find . -type d \( -name "dist" -o -name "build" \) -not -path "*/node_modules/*"
